<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Days of You | Birthday Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #fff5f7;
            overflow-x: hidden;
        }
        .cursive { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Enhanced Card Animations */
        .polaroid {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(255, 121, 198, 0.1);
            opacity: 0;
            transform: translateY(30px) scale(0.9);
        }
        
        .polaroid.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 15px 40px rgba(255, 121, 198, 0.2);
            z-index: 50;
        }

        .locked-img {
            filter: blur(20px) grayscale(1);
            opacity: 0.3;
        }

        .locked-overlay {
            background: rgba(255, 245, 247, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        /* Shake animation for locked cards */
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(-2deg); }
            25% { transform: translateX(-5px) rotate(-3deg); }
            75% { transform: translateX(5px) rotate(-1deg); }
        }

        .shake-locked {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .heart {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: floatUp 6s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff4d94, #ff99cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #birthday-overlay {
            display: none;
            background: radial-gradient(circle, #fff 0%, #ffe4ec 100%);
        }

        /* Modal Transitions */
        #modal {
            transition: opacity 0.3s ease;
        }
        #modal-content {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="heart-container"></div>

    <header class="relative z-10 pt-12 pb-6 text-center px-4">
        <span class="inline-block px-4 py-1 mb-4 text-xs font-bold tracking-widest text-pink-500 uppercase bg-pink-100 rounded-full">
            The Final Countdown
        </span>
        <h1 class="text-5xl md:text-7xl font-bold text-gray-800 mb-2">7 Days of <span class="gradient-text">Magic</span></h1>
        <p class="text-gray-500 max-w-md mx-auto text-sm md:text-base">One memory unlocked every day until the most special day of the year.</p>
        
        <div id="timer-wrapper" class="mt-8">
            <div id="main-timer" class="flex justify-center gap-4">
                <div class="glass px-4 py-2 rounded-2xl shadow-sm min-w-[70px]">
                    <span id="t-days" class="block text-2xl font-bold text-pink-600">00</span>
                    <span class="text-[10px] uppercase tracking-tighter text-gray-400">Days</span>
                </div>
                <div class="glass px-4 py-2 rounded-2xl shadow-sm min-w-[70px]">
                    <span id="t-hours" class="block text-2xl font-bold text-pink-600">00</span>
                    <span class="text-[10px] uppercase tracking-tighter text-gray-400">Hrs</span>
                </div>
                <div class="glass px-4 py-2 rounded-2xl shadow-sm min-w-[70px]">
                    <span id="t-mins" class="block text-2xl font-bold text-pink-600">00</span>
                    <span class="text-[10px] uppercase tracking-tighter text-gray-400">Mins</span>
                </div>
                <div class="glass px-4 py-2 rounded-2xl shadow-sm min-w-[70px]">
                    <span id="t-secs" class="block text-2xl font-bold text-pink-600">00</span>
                    <span class="text-[10px] uppercase tracking-tighter text-gray-400">Secs</span>
                </div>
            </div>
            <div id="timer-message" class="hidden glass px-8 py-4 rounded-3xl shadow-lg inline-block mx-auto border-pink-200">
                <p class="cursive text-3xl text-pink-600">The most beautiful day has arrived.</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 relative z-10" id="cards-grid"></main>

    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl scale-90" id="modal-content">
            <div class="relative h-64 w-full bg-gray-100">
                <img id="modal-img" src="" alt="Memory" class="w-full h-full object-cover">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/80 p-2 rounded-full hover:bg-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8 text-center">
                <h3 id="modal-title" class="cursive text-4xl text-pink-600 mb-4"></h3>
                <p id="modal-text" class="text-gray-600 leading-relaxed italic mb-8"></p>
                <button onclick="closeModal()" class="w-full bg-pink-500 text-white py-3 rounded-full font-semibold hover:bg-pink-600 shadow-lg shadow-pink-200 transition-all">Keep the Secret 💖</button>
            </div>
        </div>
    </div>

    <div id="birthday-overlay" class="fixed inset-0 z-[200] flex flex-col items-center justify-center p-8 text-center">
        <div class="animate-bounce mb-4 text-7xl">🎂</div>
        <h1 class="cursive text-7xl md:text-9xl text-pink-600 mb-6">Happy Birthday, My Love!</h1>
        <p class="text-xl md:text-2xl text-gray-700 max-w-2xl leading-relaxed">The countdown is over, but our adventure is just beginning. Today is all about you!</p>
        <button onclick="document.getElementById('birthday-overlay').style.display='none'" class="mt-12 text-pink-500 font-semibold border-b-2 border-pink-500">Back to memories</button>
    </div>

    <script>
        const startDate = new Date("May 2, 2026 00:00:00").getTime();
        const targetDate = new Date("May 9, 2026 00:00:00").getTime();
        
        const memories = [
            { id: 1, dayTrigger: 7, title: "The Spark", text: "Remembering when we first came together as a couple on that special occasion—it was the day everything started to feel right.", img: "images/black&white.JPG" },
            { id: 2, dayTrigger: 6, title: "Our Beautiful Day", text: "Looking back at our wedding photo and remembering the moment we said 'I do'. It remains the most beautiful chapter of our story.", img: "images/Wedding.jpg" },
            { id: 3, dayTrigger: 5, title: "Infinite Laughs", text: "I love how we can find humor in the smallest things. Your laugh is my favorite soundtrack.", img: "images/honeymoon.JPG" },    
            { id: 4, dayTrigger: 4, title: "My Rock", text: "Thank you for being the person I can always lean on.", img: "images/raftaRafta.JPG" },
            { id: 5, dayTrigger: 3, title: "A New Beginning", text: "Looking back at our very first New Year together as a couple. The fireworks were beautiful, but being with you was the real celebration.", img: "images/NY2026.JPG" },
            { id: 6, dayTrigger: 2, title: "The Night Before", text: "Thinking about that amazing trip and the incredible views we shared together.", img: "images/Singapore.JPG" },
            { id: 7, dayTrigger: 1, title: "Almost Midnight", text: "Only 1 day left! Sleep tight, my queen. Tomorrow is YOUR day.", img: "images/finale.JPG" }
        ];

        function init() {
            renderCards();
            updateTimer();
            setInterval(updateTimer, 1000);
            createFloatingHearts();
        }

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const now = new Date().getTime();
            const msSinceStart = now - startDate;
            const daysPassed = Math.floor(msSinceStart / (1000 * 60 * 60 * 24));
            
            grid.innerHTML = '';
            memories.forEach((m, index) => {
                const isLocked = daysPassed < index;
                const rotation = (Math.random() * 10 - 5).toFixed(2);
                const card = document.createElement('div');
                card.className = `polaroid glass p-3 pb-8 rounded-sm bg-white cursor-pointer`;
                card.style.transform = `rotate(${rotation}deg)`;
                card.style.transitionDelay = `${index * 100}ms`;

                card.innerHTML = `
                    <div class="relative aspect-square overflow-hidden mb-4 bg-gray-200 rounded-sm">
                        ${isLocked ? `
                            <div class="locked-overlay">
                                <span class="text-2xl mb-1">🔒</span>
                                <span class="text-[10px] uppercase font-bold tracking-widest text-pink-400">Locked</span>
                            </div>
                        ` : ''}
                        <img src="${m.img}" class="w-full h-full object-cover ${isLocked ? 'locked-img' : ''}" onerror="this.style.display='none'; this.parentElement.classList.add('bg-pink-50')">
                    </div>
                    <div class="text-center">
                        <span class="text-pink-400 font-bold text-xs">DAY ${m.dayTrigger}</span>
                        <h3 class="cursive text-xl text-gray-700">${isLocked ? 'A Secret Memory...' : m.title}</h3>
                    </div>
                `;

                // Handle clicks
                card.onclick = () => {
                    if (isLocked) {
                        card.classList.add('shake-locked');
                        setTimeout(() => card.classList.remove('shake-locked'), 500);
                    } else {
                        openModal(m);
                    }
                };

                grid.appendChild(card);
                
                // Trigger entry animation
                setTimeout(() => card.classList.add('show'), 50);
            });
        }

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const timerGrid = document.getElementById('main-timer');
            const timerMsg = document.getElementById('timer-message');

            if (distance < 0) {
                if(!window.birthdayShown) {
                    document.getElementById('birthday-overlay').style.display = 'flex';
                    window.birthdayShown = true;
                }
                timerGrid.classList.add('hidden');
                timerMsg.classList.remove('hidden');
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('t-days').innerText = d.toString().padStart(2, '0');
            document.getElementById('t-hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('t-mins').innerText = m.toString().padStart(2, '0');
            document.getElementById('t-secs').innerText = s.toString().padStart(2, '0');
        }

        function openModal(m) {
            document.getElementById('modal-img').src = m.img;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-text').innerText = m.text;
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            // Allow display: flex to take effect before animating opacity/scale
            setTimeout(() => {
                modal.classList.replace('opacity-0', 'opacity-100');
                content.classList.replace('scale-90', 'scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.replace('opacity-100', 'opacity-0');
            content.classList.replace('scale-100', 'scale-90');
            
            setTimeout(() => { 
                modal.classList.add('hidden'); 
            }, 300);
        }

        function createFloatingHearts() {
            const container = document.getElementById('heart-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 800);
        }
        window.onload = init;
    </script>
</body>
</html>
